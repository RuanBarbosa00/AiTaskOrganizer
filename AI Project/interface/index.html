<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Task Manager</title>

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="#">AI Task Manager</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white fw-bold" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="tasks.html">Tasks</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="settings.html">Settings</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="image_import">Image Import</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container py-5">

    <h1 class="text-center mb-4">Add Task</h1>

    <div class="card shadow-sm p-4">
        <div class="input-group input-group-lg">
            <input 
                id="taskInput" 
                type="text" 
                class="form-control" 
                placeholder="Ex: Math exam 03/16"
            >
            <button class="btn btn-primary" onclick="addTask()">Add</button>
        </div>
    </div>

    <div id="alertBox" class="alert alert-success mt-4 d-none">
        Task saved successfully!
    </div>

    <div class="text-center mt-4">
        <a href="tasks.html" class="btn btn-primary btn-lg me-2">View Tasks</a>
        <a href="settings.html" class="btn btn-outline-secondary btn-lg">Settings</a>
    </div>

    <!-- IMAGE IMPORT CARD -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-sm p-4 text-center" 
                     style="cursor:pointer;" 
                     onclick="window.location.href='image_import'">

                    <div style="font-size: 3rem;">🖼️</div>

                    <h4 class="mt-3 fw-bold">Import from Image</h4>

                    <p class="text-muted">
                        Extract tasks automatically from screenshots or photos.
                    </p>

                    <button class="btn btn-primary btn-lg mt-2">
                        Import Image
                    </button>

                </div>

            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if (!text) return;

    const task = {
        name: text,
        type: "unknown",
        due: "",
        priority: "Medium",
        status: "FUTURE"
    };

    await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(task)
    });

    input.value = "";

    const alertBox = document.getElementById("alertBox");
    alertBox.classList.remove("d-none");
    setTimeout(() => alertBox.classList.add("d-none"), 2000);
}
</script>

</body>
</html>
